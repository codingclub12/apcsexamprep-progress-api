<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>APCSExamPrep · Admin sign-in</title>
<style>
  :root {
    color-scheme: light dark;
    --plane: #f9f9f7; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --muted: #898781; --border: rgba(11,11,11,0.10); --csa: #2a78d6; --critical: #d03b3b;
    --shadow: 0 1px 2px rgba(11,11,11,0.04), 0 1px 3px rgba(11,11,11,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --plane: #0d0d0d; --surface: #1a1a19; --ink: #fff; --ink-2: #c3c2b7;
      --muted: #898781; --border: rgba(255,255,255,0.10); --csa: #3987e5; --critical: #e66767; --shadow: none;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    background: var(--plane); color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 400px; margin: 14vh 20px 0; padding: 28px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
  }
  h1 { margin: 0 0 6px; font-size: 18px; }
  p { margin: 0 0 18px; color: var(--ink-2); font-size: 13px; }
  label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  input, button { font: inherit; width: 100%; border-radius: 8px; padding: 10px 12px; }
  input { color: var(--ink); background: var(--plane); border: 1px solid var(--border); margin-bottom: 14px; }
  button { cursor: pointer; border: none; background: var(--csa); color: #fff; font-weight: 600; }
  button:disabled { opacity: 0.6; cursor: default; }
  .err { color: var(--critical); font-size: 13px; min-height: 18px; margin-top: 12px; }
  code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
</style>
</head>
<body>
  <form class="card" id="form">
    <h1>Class Dashboard</h1>
    <p>Enter the admin key to continue. A short-lived, http-only session cookie is set in this browser; the key is never stored.</p>
    <label for="key">Admin key</label>
    <input id="key" name="key" type="password" autocomplete="current-password" autofocus />
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
<script>
(function () {
  "use strict";
  var form = document.getElementById("form");
  var btn = document.getElementById("btn");
  var err = document.getElementById("err");
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var key = document.getElementById("key").value;
    if (!key) { err.textContent = "Enter the admin key."; return; }
    btn.disabled = true; err.textContent = "Checking…";
    fetch("/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: key })
    }).then(function (r) {
      if (r.ok) { window.location.href = "/admin/dashboard"; return; }
      return r.json().catch(function () { return {}; }).then(function (j) {
        err.textContent = r.status === 429
          ? (j.error || "Too many attempts. Wait a few minutes.")
          : "Invalid admin key.";
        btn.disabled = false;
      });
    }).catch(function () {
      err.textContent = "Could not reach the server. Try again.";
      btn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
